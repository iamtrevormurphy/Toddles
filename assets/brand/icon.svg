<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E8DFF5"/>
      <stop offset="1" stop-color="#FBE7D6"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#sky)"/>
  <g transform="translate(58, 56) scale(9.2)">
    <!-- head, with 2.5D bottom band -->
    <rect x="16" y="84" width="60" height="9" fill="#589091"/>
    <rect x="16" y="24" width="60" height="60" fill="#5FA8A0"/>
    <!-- crest -->
    <path d="M 40 24 L 58 24 L 49 8 Z" fill="#E2795B"/>
    <!-- beak -->
    <path d="M 16 46 L 16 62 L 2 54 Z" fill="#EDB95F"/>
    <!-- waving wing, raised beside the head -->
    <path d="M 72 62 L 90 40 L 97 47 L 79 69 Z" fill="#6C8FD4"/>
    <!-- left eye open + glint, right eye WINKING (happy closed arc) -->
    <circle cx="34" cy="48" r="5.5" fill="#3E3A5E"/>
    <circle cx="36" cy="46.2" r="1.7" fill="#FFFDF9"/>
    <path d="M 52 48 Q 58 53.5 64 48" stroke="#3E3A5E" stroke-width="3.4" stroke-linecap="round" fill="none"/>
    <!-- cheeks (the winking side blushes a touch bigger) -->
    <circle cx="27" cy="64" r="5" fill="#D98BA3" opacity="0.85"/>
    <circle cx="64" cy="63" r="5.8" fill="#D98BA3" opacity="0.85"/>
  </g>
</svg>
